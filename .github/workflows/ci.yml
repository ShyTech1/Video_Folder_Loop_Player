name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  docker-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: docker build --target ci -t video-loop-player-ci .

      - name: Run typecheck
        run: docker run --rm video-loop-player-ci npm run typecheck

      - name: Run production dependency audit
        run: docker run --rm video-loop-player-ci npm run audit:prod

      - name: Build production bundle
        run: docker build --target build -t video-loop-player-build .

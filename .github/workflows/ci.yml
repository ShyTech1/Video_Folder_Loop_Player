name: CI

on:
  push:
    branches:
      - main
      - staging
      - "release/*.*.*"
  pull_request:
    branches:
      - main
      - staging
      - "release/*.*.*"

jobs:
  app-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run production dependency audit
        run: npm run audit:prod

      - name: Build production bundle
        run: npm run build

  docker-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Build CI image
        run: docker build --target ci -t video-loop-player-ci .

      - name: Run typecheck
        run: docker run --rm video-loop-player-ci npm run typecheck

      - name: Run production dependency audit
        run: docker run --rm video-loop-player-ci npm run audit:prod

      - name: Build production bundle
        run: docker build --target build -t video-loop-player-build .
